<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AI Chess</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #2c2f33;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #game-container {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #eval-container {
            width: 100%;
            height: 24px;
            background-color: #000000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 2px solid #555;
        }
        #eval-bar {
            height: 100%;
            background-color: #ffffff;
            width: 50%;
            transition: width 0.4s ease-in-out;
        }
        #eval-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            color: #ff4444;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #board {
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #status-box {
            background: #23272a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
        }
        button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            background-color: #7289da;
            color: white;
            border: none;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover { background-color: #5b6eae; }
        .btn-black { background-color: #4a4d53; }
        .btn-black:hover { background-color: #3b3e44; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>Motore Neurale</h2>
        
        <div id="eval-container">
            <div id="eval-bar"></div>
            <div id="eval-text">0.00</div>
        </div>

        <div id="board"></div>

        <div id="status-box">Seleziona un colore per iniziare!</div>
        
        <div class="btn-group">
            <button onclick="newGame('white')">Gioca col Bianco</button>
            <button class="btn-black" onclick="newGame('black')">Gioca col Nero</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        let board = null;
        let isEngineThinking = false;
        let playerColor = 'white';
        
        const files = {'a':0, 'b':1, 'c':2, 'd':3, 'e':4, 'f':5, 'g':6, 'h':7};
        function parseSq(sq) {
            let file = files[sq[0]];
            let rank = parseInt(sq[1]) - 1;
            return rank * 8 + file;
        }

        function updateUI(data) {
            board.position(data.fen); 
            
            let evalValue = data.eval;
            let percentage = ((evalValue + 1.0) / 2.0) * 100;
            percentage = Math.max(5, Math.min(95, percentage));
            $('#eval-bar').css('width', percentage + '%');
            $('#eval-text').text(evalValue.toFixed(2));

            if (data.game_over) {
                $('#status-box').text(data.result_text);
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (isEngineThinking) return false;
            if (playerColor === 'white' && piece.search(/^b/) !== -1) return false;
            if (playerColor === 'black' && piece.search(/^w/) !== -1) return false;
        }

        function onDrop(source, target, piece, newPos, oldPos, orientation) {
            if (isEngineThinking) return 'snapback';

            let from_idx = parseSq(source);
            let to_idx = parseSq(target);

            let isPromotion = false;
            if (piece === 'wP' && source[1] === '7' && target[1] === '8') {
                isPromotion = true;
            } else if (piece === 'bP' && source[1] === '2' && target[1] === '1') {
                isPromotion = true;
            }

            isEngineThinking = true;
            $('#status-box').text("Verifica mossa in corso...");

            $.get('/move_coordinates', {from: from_idx, to: to_idx, promotion: isPromotion ? 'true' : 'false'}, function(data) {
                updateUI(data);

                if (data.accepted && !data.game_over) {
                    $('#status-box').text("L'IA sta pensando...");
                    
                    $.get('/ai_move', function(aiData) {
                        updateUI(aiData);
                        isEngineThinking = false;
                        if(!aiData.game_over) $('#status-box').text("Tocca a te!");
                    });
                } else {
                    isEngineThinking = false;
                    if (!data.accepted && !data.game_over) {
                        $('#status-box').text("Mossa illegale! Riprova.");
                    }
                }
            });
        }

        function newGame(color) {
            playerColor = color;
            board.orientation(color); 
            $('#status-box').text("Avvio partita...");
            isEngineThinking = true;
            
            $.get('/newgame', {color: color}, function(data) {
                updateUI(data);
                if (color === 'black') {
                    $('#status-box').text("L'IA ha mosso. Tocca a te!");
                } else {
                    $('#status-box').text("Nuova partita! Tocca a te.");
                }
                isEngineThinking = false;
            });
        }

        let config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        board = Chessboard('board', config);

        $.get('/get_state', function(data) {
            updateUI(data);
        });
    </script>
</body>
</html>
